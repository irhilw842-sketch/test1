<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Portal</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .disclaimer { background-color: #fff3cd; color: #856404; padding: 15px; border: 1px solid #ffeeba; margin-bottom: 20px; font-weight: bold; }
        video { border: 2px solid #ccc; border-radius: 8px; margin-bottom: 10px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Welcome to Our Restaurant</h1>
    
    <div class="disclaimer">
        NOTICE: This website takes an image of you and sends your location to inform the restaurant staff. By proceeding, you consent to sharing this data.
    </div>

    <video id="videoFeed" width="320" height="240" autoplay playsinline></video>
    <canvas id="photoCanvas" width="320" height="240" style="display:none;"></canvas>
    
    <br>
    <button id="sendDataBtn">Send My Photo & Location</button>
    <p id="statusMessage"></p>

    <script>
        const video = document.getElementById('videoFeed');
        const canvas = document.getElementById('photoCanvas');
        const sendBtn = document.getElementById('sendDataBtn');
        const statusText = document.getElementById('statusMessage');

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => {
                statusText.innerText = "Camera access denied.";
                statusText.style.color = "red";
            });

        sendBtn.addEventListener('click', () => {
            statusText.innerText = "Gathering data...";
            statusText.style.color = "black";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        captureAndSend({
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude
                        });
                    },
                    (error) => {
                        statusText.innerText = "Location access denied.";
                        statusText.style.color = "red";
                    }
                );
            }
        });

        function captureAndSend(locationData) {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = canvas.toDataURL('image/png');

            // Notice the URL is /api/save-data
            fetch('/api/save-data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData, location: locationData })
            })
            .then(response => response.json())
            .then(data => {
                statusText.innerText = "Success! Data sent.";
                statusText.style.color = "green";
                console.log("Saved at:", data.imageUrl);
            })
            .catch(err => {
                statusText.innerText = "Error sending data.";
                statusText.style.color = "red";
            });
        }
    </script>
</body>
</html>
